# ── Deploy Backend to Railway ────────────────────────
# Triggers on push to main AFTER CI passes.
#
# Setup:
#   1. Install Railway CLI: npm i -g @railway/cli
#   2. Run: railway login
#   3. Link project: railway link
#   4. Get token: railway tokens create
#   5. Add RAILWAY_TOKEN to GitHub repo secrets
#   6. Add RAILWAY_SERVICE_ID to GitHub repo secrets
#      (find it in Railway dashboard → service → Settings → Service ID)

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-backend
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  # Gate: run tests first
  test:
    name: Test Gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
